<template>
  <!-- BACKGROUND IMAGE -->
  <div
    v-if="store.overlayOpen"
    class="fixed inset-0 backdrop-blur-xl z-[10000]"
    :style="backgroundStyles"
  ></div>

  <!-- CHAT MODAL -->
  <div
    v-if="store.overlayOpen"
    class="fixed inset-0 z-[10002] flex items-center justify-center p-4"
  >
    <div class="w-full max-w-3xl h-[80vh] bg-[#121212] rounded-lg overflow-hidden flex flex-col shadow-2xl border border-white/10">
      <!-- Header -->
      <div class="h-14 border-b border-white/10 flex items-center justify-between px-4 bg-[#1a1a1a]">
        <button 
          class="text-lg text-white/90 hover:text-white transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/10" 
          @click="closeChat"
        >
          ←
        </button>
        
        <div class="font-medium truncate text-white/95 px-2">
          {{ recipientName }}
        </div>
        
        <!-- Header Icons -->
        <div class="flex items-center gap-2">
          <button 
            class="text-white/50 hover:text-white transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/10" 
            @click="closeChat"
          >
            ✕
          </button>
        </div>
      </div>

      <!-- Messages Container -->
      <div 
        ref="scroller" 
        class="flex-1 overflow-y-auto bg-[#121212] p-4"
        @scroll="handleScroll"
      >
        <!-- Loading State -->
        <div v-if="store.overlayLoading" class="flex items-center justify-center h-full">
          <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-white/30"></div>
        </div>

        <!-- Error State -->
        <div v-else-if="store.overlayError" class="flex items-center justify-center h-full">
          <div class="text-center text-red-400">
            <i class="fas fa-exclamation-circle text-2xl mb-2"></i>
            <p>{{ store.overlayError }}</p>
            <button 
              @click="retryLoad" 
              class="mt-4 px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg text-white/90 transition-colors"
            >
              Try Again
            </button>
          </div>
        </div>

        <!-- Empty State -->
        <div 
          v-else-if="messages.length === 0" 
          class="flex items-center justify-center h-full text-white/50"
        >
          <div class="text-center">
            <i class="fas fa-comments text-3xl mb-3 opacity-40"></i>
            <p>Start a conversation with {{ recipientName }}</p>
          </div>
        </div>

        <!-- Messages - using MessageBubble component -->
        <div v-else>
          <div 
            v-for="(message, index) in messages" 
            :key="message.id"
            class="mb-3 last:mb-0"
          >
            <!-- Date Separator -->
            <div 
              v-if="shouldShowDateSeparator(index)" 
              class="flex justify-center my-4"
            >
              <span class="text-xs bg-white/5 text-white/50 px-3 py-1 rounded-full">
                {{ formatDate(message.created_at) }}
              </span>
            </div>

            <MessageBubble
              :message="message"
              :is-own-message="message.user_id === store.currentUserId"
              :is-medium-desktop="false"
              :is-small-desktop="false"
              :user-language="store.userLanguage || 'en'"
              @open-media="openMedia"
            />
          </div>
        </div>
      </div>

      <!-- Message Input Area -->
      <div class="border-t border-white/10 p-4 bg-[#1a1a1a]">
        <MessageInput
          v-model="newMessage"
          :sending-message="sending"
          :selected-chat="currentChat"
          :is-medium-desktop="false"
          :is-small-desktop="false"
          @send-message="sendMessage"
          @open-payment="openPaymentModal"
          @media-selected="handleMediaSelected"
        />
      </div>
    </div>
  </div>

  <!-- PAYMENT MODAL -->
  <Teleport to="body">
    <SubdomainChatPaymentModal
      v-if="showPaymentModal && currentChat"
      :show="showPaymentModal"
      :chat="currentChat"
      :currentUserId="store.currentUserId"
      :targetUser="store.overlayTargetUser"
      @close="closePaymentModal"
      @payment-sent="handlePaymentSent"
    />
  </Teleport>

  <!-- MEDIA PREVIEW MODAL - Fixed: image now scales without scrollbars -->
  <Teleport to="body">
    <div 
      v-if="showMediaModal" 
      class="fixed inset-0 z-[10003] bg-black/90 flex items-center justify-center p-4 overflow-hidden"
      @click="showMediaModal = false"
    >
      <img 
        :src="mediaModalUrl" 
        class="max-w-[calc(100vw-2rem)] max-h-[calc(100vh-2rem)] w-auto h-auto object-contain"
        @click.stop
      />
      <button 
        class="absolute top-4 right-4 text-white/70 hover:text-white text-2xl z-10"
        @click="showMediaModal = false"
      >
        ✕
      </button>
    </div>
  </Teleport>
</template>

<script setup>
import { ref, computed, watch, nextTick, onMounted, onUnmounted } from 'vue'
import axios from 'axios'
import { chatStore } from '@/stores/subdomainChatStore'
import { useSubdomainDM } from '@/composables/useSubdomainDM'
import SubdomainChatPaymentModal from '@/components/chat/SubdomainChatPaymentModal.vue'
import MessageInput from '@/components/chat/MessageInput.vue'
import MessageBubble from '@/components/chat/MessageBubble.vue'

// No props – everything comes from the store
const emit = defineEmits(['close'])

// ===== Composables =====
const { getOrCreateChat } = useSubdomainDM()

// ===== Local State =====
const newMessage = ref('')
const sending = ref(false)
const showPaymentModal = ref(false)
const showMediaModal = ref(false)
const mediaModalUrl = ref('')
const currentChat = ref(null)
const scroller = ref(null)
const echoChannel = ref(null)
const isNearBottom = ref(true)
const usersMap = ref(new Map())

// ===== Computed =====
const store = computed(() => chatStore)

const recipientName = computed(() => {
  return store.value.overlayTargetUser?.name || 
         currentChat.value?.users?.find(u => u.id !== store.value.currentUserId)?.name || 
         'User'
})

const messages = computed(() => {
  if (!store.value.overlayChatId) return []
  return store.value.messages[store.value.overlayChatId] || []
})

const backgroundStyles = computed(() => {
  if (store.value.overlayTargetUser?.profile_photo_url) {
    return {
      backgroundImage: `url('${store.value.overlayTargetUser.profile_photo_url}')`,
      backgroundSize: 'cover',
      backgroundPosition: 'center center',
      backgroundRepeat: 'no-repeat',
      opacity: '0.12',
      filter: 'blur(12px) grayscale(50%) brightness(0.8)',
    }
  }
  return {
    background: 'linear-gradient(135deg, rgba(26, 26, 26, 0.95) 0%, rgba(45, 45, 45, 0.95) 100%)',
  }
})

// ===== Methods =====
const closeChat = () => {
  console.log('[Overlay] Closing chat')
  chatStore.closeOverlay()
  currentChat.value = null
  emit('close')
}

const retryLoad = () => {
  store.value.overlayError = null
  initializeChat()
}

const loadCurrentUser = async () => {
  if (store.value.currentUserId) return

  try {
    const res = await axios.get('/api/user')
    chatStore.setCurrentUserId(res.data.id)
    usersMap.value.set(res.data.id, res.data)
  } catch (error) {
    console.error('[Overlay] Failed to load current user:', error)
    store.value.overlayError = 'Please log in to send messages.'
  }
}

const loadMessagesFromApi = async (chatId) => {
  try {
    console.log('[Overlay] Loading messages from API for chat:', chatId)
    const response = await axios.get(`/api/chats/${chatId}/messages`)
    const messagesData = response.data.data || response.data || []
    chatStore.setMessages(chatId, messagesData)
    console.log('[Overlay] Loaded', messagesData.length, 'messages from API')
    return messagesData
  } catch (error) {
    console.error('[Overlay] Failed to load messages from API:', error)
    return []
  }
}

const initializeChat = async () => {
  store.value.overlayLoading = true
  store.value.overlayError = null
  
  try {
    const targetUser = store.value.overlayTargetUser
    if (!targetUser?.id) {
      throw new Error('No target user specified')
    }
    
    console.log('[Overlay] Initializing chat with recipient:', targetUser.id)
    
    const context = {
      context_type: store.value.overlayContextType || 'user_profile',
      context_id: store.value.overlayContextId || targetUser.id
    }
    
    const chat = await getOrCreateChat(targetUser.id, context)
    
    if (!chat) throw new Error('Failed to create or retrieve chat')
    
    currentChat.value = chat
    chatStore.setOverlayChatId(chat.id)
    
    if (chat.users) {
      chat.users.forEach(user => usersMap.value.set(user.id, user))
    }
    
    // Load messages directly from API to ensure persistence
    await loadMessagesFromApi(chat.id)
    await markAsRead(chat.id)
    setupEchoListener(chat.id)
    
    await nextTick()
    scrollToBottom('auto')
    
  } catch (error) {
    console.error('[Overlay] Chat initialization failed:', error)
    store.value.overlayError = error.message || 'Could not load chat. Please try again.'
  } finally {
    store.value.overlayLoading = false
  }
}

const setupEchoListener = (chatId) => {
  if (!window.Echo) {
    console.warn('[Overlay] Echo not available')
    return
  }
  
  if (echoChannel.value) {
    echoChannel.value.stopListening('MessageSent')
    window.Echo.leave(`chat.${chatId}`)
  }
  
  console.log('[Overlay] Setting up Echo listener for chat:', chatId)
  
  echoChannel.value = window.Echo.private(`chat.${chatId}`)
    .listen('MessageSent', async (event) => {
      console.log('[Overlay] Real-time message received:', event)
      
      const message = event.message || event
      
      if (chatId === store.value.overlayChatId) {
        await markAsRead(chatId)
        chatStore.addMessage(chatId, message)
        
        if (isNearBottom.value) {
          nextTick(() => scrollToBottom())
        }
      }
    })
    .error((error) => {
      console.error('[Overlay] Echo connection error:', error)
      store.value.overlayError = 'Real-time connection lost. Refresh to reconnect.'
    })
}

const markAsRead = async (chatId) => {
  try {
    await axios.post(`/api/chats/${chatId}/read`)
    chatStore.unreadCounts[chatId] = 0
  } catch (error) {
    console.error('[Overlay] Failed to mark as read:', error)
  }
}

const sendMessage = async () => {
  if (!newMessage.value.trim() || !store.value.overlayChatId || sending.value) return
  
  sending.value = true
  try {
    console.log('[Overlay] Sending message:', newMessage.value)
    
    const response = await axios.post(`/api/chats/${store.value.overlayChatId}/messages`, {
      content: newMessage.value,
      type: 'text'
    })
    
    const message = response.data.data || response.data
    console.log('[Overlay] Message sent successfully:', message)
    
    chatStore.addMessage(store.value.overlayChatId, message)
    newMessage.value = ''
    scrollToBottom()
    
  } catch (error) {
    console.error('[Overlay] Send failed:', error)
    store.value.overlayError = error.response?.data?.message || 'Message failed to send. Try again.'
  } finally {
    sending.value = false
  }
}

const handleMediaSelected = async (mediaData) => {
  if (!store.value.overlayChatId) return
  
  sending.value = true
  try {
    const formData = new FormData()
    formData.append('file', mediaData.file)
    formData.append('type', mediaData.type || 'file')
    formData.append('caption', mediaData.caption || '')
    
    const response = await axios.post(`/api/chats/${store.value.overlayChatId}/media`, formData, {
      headers: { 'Content-Type': 'multipart/form-data' }
    })
    
    const message = response.data.data || response.data
    chatStore.addMessage(store.value.overlayChatId, message)
    scrollToBottom()
  } catch (error) {
    console.error('[Overlay] Media upload failed:', error)
    store.value.overlayError = 'Failed to upload media. Try again.'
  } finally {
    sending.value = false
  }
}

const openPaymentModal = () => {
  if (!currentChat.value) return
  showPaymentModal.value = true
}

const closePaymentModal = () => {
  showPaymentModal.value = false
}

const handlePaymentSent = async (paymentData) => {
  console.log('[Overlay] Payment sent:', paymentData)
  
  if (paymentData.message) {
    chatStore.addMessage(store.value.overlayChatId, paymentData.message)
    scrollToBottom()
  }
  
  closePaymentModal()
}

const openMedia = (mediaData) => {
  mediaModalUrl.value = mediaData.url || mediaData
  showMediaModal.value = true
}

const formatDate = (timestamp) => {
  const date = new Date(timestamp)
  const today = new Date()
  const yesterday = new Date(today)
  yesterday.setDate(yesterday.getDate() - 1)
  
  if (date.toDateString() === today.toDateString()) {
    return 'Today'
  } else if (date.toDateString() === yesterday.toDateString()) {
    return 'Yesterday'
  } else {
    return date.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' })
  }
}

const shouldShowDateSeparator = (index) => {
  if (index === 0) return true
  const currentDate = new Date(messages.value[index].created_at).toDateString()
  const prevDate = new Date(messages.value[index - 1].created_at).toDateString()
  return currentDate !== prevDate
}

const scrollToBottom = (behavior = 'smooth') => {
  if (scroller.value) {
    scroller.value.scrollTo({
      top: scroller.value.scrollHeight,
      behavior
    })
  }
}

const handleScroll = () => {
  if (!scroller.value) return
  
  const { scrollTop, scrollHeight, clientHeight } = scroller.value
  const distanceFromBottom = scrollHeight - scrollTop - clientHeight
  isNearBottom.value = distanceFromBottom < 100
}

// ===== Watchers =====
watch(() => store.value.overlayOpen, async (open) => {
  if (open && !currentChat.value) {
    await loadCurrentUser()
    await initializeChat()
  }
})

watch(messages, () => {
  if (isNearBottom.value) {
    scrollToBottom()
  }
}, { deep: true })

// ===== Lifecycle =====
onMounted(async () => {
  document.addEventListener('keydown', handleEscapeKey)
  await loadCurrentUser()
  // Only initialize if overlay is already open (should be opened by parent)
  if (store.value.overlayOpen) {
    await initializeChat()
  }
})

onUnmounted(() => {
  document.removeEventListener('keydown', handleEscapeKey)
  
  if (echoChannel.value) {
    echoChannel.value.stopListening('MessageSent')
    if (echoChannel.value.name) {
      window.Echo.leave(`chat.${echoChannel.value.name}`)
    }
  }
})

const handleEscapeKey = (event) => {
  if (event.key === 'Escape' && store.value.overlayOpen) {
    if (showPaymentModal.value) {
      closePaymentModal()
    } else if (showMediaModal.value) {
      showMediaModal.value = false
    } else {
      closeChat()
    }
  }
}
</script>

<style scoped>
/* Mobile optimizations */
@media (max-width: 640px) {
  .fixed.inset-0.items-center {
    padding: 0;
  }
  
  .max-w-3xl {
    max-width: 100%;
    height: 100vh !important;
    border-radius: 0 !important;
  }
  
  .safe-area-bottom {
    padding-bottom: max(env(safe-area-inset-bottom), 8px);
  }
}

/* Prevent zoom on iOS input focus */
input, textarea {
  font-size: 16px;
}

/* Custom scrollbar */
::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-track {
  background: rgba(255, 255, 255, 0.05);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.15);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: rgba(255, 255, 255, 0.25);
}

/* Smooth transitions */
* {
  transition: background-color 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
}
</style>
